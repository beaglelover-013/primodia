   - 绵绵冷雨（5%）：天空灰暗。细小密集的雨水持续降下。雨水不结冰但温度极低，迅速浸透布料与木材，导致环境极度潮湿且带走热量。\r\n    - 阵雨骤降（5%）：厚重云层遮挡光线。短时间内降下大颗粒雨滴，随后雨势骤停。路面低洼处迅速积聚深水流，泥土腥气加重。\r\n    - 冻雨淅沥（3%）：阴沉。过冷雨滴接触地表或物体瞬间结成透明冰壳。树干挂满冰凌，建筑外墙与路面覆盖极度湿滑的冰层。\r\n    - 雨雪混合（4%）：铅灰色天空。碎冰晶与冷雨混合降下。落地后迅速融化为冰水混合物。空气湿度极高，寒气具有穿透性。\r\n    - 飞雪复降（4%）：持续降下大片雪花。光线昏暗。新增积雪重新覆盖已融化露出的泥土与石板，大幅增加地表摩擦阻力与掩盖路面坑洼。\r\n    - 零星阵雪（4%）：云层间隙透光。稀疏的碎雪随风飘落。落地即化或被风吹散，无积雪形成，对环境无实质物理改变。\r\n    - 冰粒降落（3%）：低云密布。细小的硬质冰粒密集砸下。击打在玻璃、木板与布料上发出密集噼啪声，接触无防护表皮产生微小物理痛感。\r\n    - 狂风呼啸（4%）：无降水。强劲气流贴地掠过。风声掩盖周围细微声音。枯枝断裂，地表残雪与干土被卷入空中，迎风面承受显著物理推力。\r\n    - 晴风扬尘（4%）：晴朗，光线充足。大风卷起已解冻且水分蒸发的干燥泥土。空气中悬浮大量细小沙砾，视线受阻，呼吸伴随土腥味。\r\n    - 紊乱阵风（4%）：气团不稳定，风力与风向频繁改变。吹动轻质物体与未固定的布料，产生不规则的拉扯力，空气气温忽冷忽热。\r\n    - 微风和煦（4%）：高空少云。气流平缓，阳光温度适宜。积雪与残冰平稳消融，土壤变得松软，无极端物理阻碍。\r\n    - 薄云微暖（4%）：一层半透明高云遮蔽直射阳光。光线柔和且无阴影。环境温度略高于冰点，地表水分蒸发缓慢，空气静谧。\r\n    - 阴沉停滞（4%）：厚重灰云完全遮蔽天空。无风无降水。光线暗淡，气压偏低。积雪融化过程停滞，环境缺乏动态声音。\r\n    - 阴冷透骨（4%）：低压浓云。空气极度潮湿且温度逼近零度。无风。寒气附着在物体表面，金属与石材触感极寒，布料失去保暖性。\r\n    - 湿冷弥漫（3%）：无明显降雨。空气中充满悬浮冷水滴。所有未加热物体表面凝结微小水珠，木材与纸张发软，环境充斥湿润霉味。\r\n    - 浓雾笼罩（4%）：乳白色浓重水汽覆盖地表。视线在十步之外完全被阻断。声音传播变得发闷且方向难辨，空气充满水腥气。\r\n    - 朦胧薄雾（3%）：空气湿度大。浅层雾气持续存在。景物色彩饱和度降低，边缘模糊。光线在水汽中散射呈现均润的灰白色。\r\n    - 寒霜遍地（3%）：气温极低，空气清冷。地表、残草、金属及石材表面凝结出一层刺白的细密冰晶。接触该表面极易流失热量。\r\n    - 泥泞坚冰（3%）：降温导致原本泥泞的土路冻结。地面布满深浅不一的硬化车辙与脚印坑洼。表面坚硬且极不平整，产生强烈的行走与滚动颠簸。\r\n    - 刺眼雪光（3%）：万里无云。强烈阳光直接反射在广阔平整的残雪或结冰水面上。环境亮度远超常态，直视会导致视觉产生重影与短暂白化。\r\n    - 沉闷雷暴（3%）：黑云快速堆积。天际闪现白光并伴随低沉滚动的雷声。无降水。气压急剧下降，空气中弥漫微弱的静电感。\r\n    - 冽风割面（4%）：无云晴天。高速干冷气流持续刮过。环境透明度极高，风迅速剥夺物体表面水分与温度，导致暴露表面快速干燥发紧。\r\n</天气_解冻月_id3>\r\n\r\n<天气_残雪月_id2>\r\n天气_残雪月:\r\n  天气列表:\r\n    - 晴冷坚冰（8%）：万里无云。阳光直射，光线极度明亮。前期积雪表面冻结成坚硬冰壳，踩踏无凹陷，环境反射出强烈的刺眼白光。\r\n    - 阴风残雪（8%）：厚重灰云遮蔽天空。持续冷风刮过。大片积雪区表面被风吹出硬质波纹，空气中缺乏水汽，体感极度阴冷刺骨。\r\n    - 表面微融（6%）：无云。正午阳光照射下，向阳面冰雪表层出现极微弱液化。形成极薄的水膜，背阴处依然坚硬，日落后迅速重结冰。\r\n    - 狂风卷冰（6%）：高速干冷气流掠过地表。卷起松散的冰晶与干雪碎屑。打在硬物上发出沙沙声，迎风面视线受阻，风力推挤明显。\r\n    - 阴沉死寂（6%）：均质铅灰云层覆盖。无风无降水。气压偏低，光线极其平淡暗沉，积雪形态完全静止，环境缺乏任何物理回声。\r\n    - 冻土干裂（5%）：裸露的泥土路面被彻底冻透。表面出现细小干裂纹。大风刮过扬起冻结的微尘，踩踏在泥土上坚硬如石。\r\n    - 细雪飞舞（5%）：浅灰天空。细小干燥的雪花随微风飘落。降雪量极小，无法形成新积雪，仅在残雪表面覆盖一层极薄的粉末。\r\n    - 冰雾弥漫（5%）：近地水汽凝华。形成乳白色的细密冰晶雾。能见度不足十米，声音传播发钝，所有暴露表面凝结出细小冰刺。\r\n    - 阵雪骤停（4%）：云块移动。短时间内密集降下大片雪花，随即停止。在原有的硬雪壳上铺上一层松软新雪，阳光下很快被风吹散。\r\n    - 刺骨寒风（4%）：晴朗透明。持续刮起强烈冷风。强行剥夺地表热量，风声尖锐，暴露表面迅速失去水分，残雪边缘被风力刻蚀。\r\n    - 阴霾低压（4%）：云层低垂压抑。空气凝滞无风。烟囱排烟下沉，环境带有陈旧的灰白色调，木质结构散发轻微的干冷朽味。\r\n    - 冰面打滑（4%）：无降水。路面上的残余死水或踩踏压实的雪彻底硬化。形成大面积不规则的透明暗冰，摩擦力极低，极易导致失控。\r\n    - 强光雪盲（4%）：无云。阳光直接照射在大面积残雪上。缺乏阴影缓冲，极高亮度的反光导致视觉重影，直视引发短暂白化。\r\n    - 微风刺痛（4%）：风速缓慢。但气团极寒。风中带有冰雪的清冽气味，持续切割物体表面，具有极强的物理穿透性与剥离感。\r\n    - 沉闷冷光（3%）：半透明高云遮挡太阳。光线苍白无力。地面缺乏明暗交界，气温极低，整个环境呈现出僵硬的静态。\r\n    - 冰雹夹冰（3%）：冷气团突入。短时降下坚硬的小冰粒。密集击打残雪层与建筑外墙，发出清脆劈啪声，无融化迹象。\r\n    - 寒霜密布（3%）：无云无风。清晨时分所有表面均覆盖极厚重的刺白冰晶。甚至覆盖在原有的残雪层上，极度消耗周围微弱热量。\r\n    - 局部旋风（3%）：气流交汇。在残雪空地上形成小型旋风。卷起干雪粉末与冰晶高速旋转，打在表面有轻微物理痛感。\r\n    - 多云阵寒（3%）：厚重云块被风推移。阴影扫过地表时，温度出现断崖式跌落，光线在刺眼反光与沉闷阴影间生硬切换。\r\n    - 冰层微裂（3%）：深水洼或河流厚冰层受气温细微波动影响。内部产生应力，发出沉闷的断裂声响，表面未完全破裂。\r\n    - 冻雨形成（2%）：极其罕见的升温气团。降下过冷水。接触残雪与建筑表面瞬间凝结为透明硬壳，导致环境极度湿滑且危险。\r\n    - 朦胧冰尘（2%）：空气中悬浮大量细微冰晶。视线远端呈现灰白色模糊。光线在空气中发生散射，呼吸带有冰凉颗粒感。\r\n    - 极低入射（2%）：太阳贴近地平线。阳光拉长残雪的冷色阴影。光线呈现灰白色调，完全丧失热度，视觉上极度冰冷。\r\n    - 泥雪混合（2%）：车辙密集区。残雪与冻土被反复碾压。形成坚硬的黑褐色冰雪混合块，表面凹凸不平，行走极度颠簸。\r\n    - 寒气逼人（2%）：气温降至本月最低点。空气水分完全冻结。环境极度干爽、寂静，缺乏任何动态自然声响，触物如握寒冰。\r\n</天气_残雪月_id2>\r\n<天气_冰封月_id1>\r\n天气_冰封月:\r\n  天气列表:\r\n    - 极寒冰封（8%）：万里无云。地表被厚重坚冰与积雪完全覆盖。阳光照射下雪面泛出刺眼蓝白冷光，空气水分完全析出，木材因极寒收缩发出清晰的爆裂脆响。\r\n    - 漫天飞雪（8%）：天空铅灰。大片干松雪花密集且无间歇降下。能见度降至极低，新增降雪迅速掩盖所有地表特征，环境声音被大雪严重吸收，一片死寂。\r\n    - 阴沉透骨（6%）：均质厚重黑云密布。无风无降雪。气温探底，空气凝滞。未加热的金属与石材表面触之极易发生物理粘连，光线极度暗沉。\r\n    - 狂风暴雪（6%）：暴力冷气流裹挟密集降雪。雪片横向高速飞舞，严重物理阻碍视线。风力将雪堆积在背风处，强行堵塞门窗，物理推力极大。\r\n    - 晴冷干风（6%）：天空高远透明。阳光毫无加热能力。持续干冷风刮过，迅速切割暴露表面，带走仅存的热量，冰面平滑反光，风声尖锐。\r\n    - 坚冰覆地（5%）：无降水。前期积雪彻底冻结成坚硬厚实的暗冰层。路面摩擦力趋近于绝对零度，行走与物体移动极度困难且完全失控。\r\n    - 细碎干雪（5%）：灰暗天空。细小如盐粒的干冰晶随风飘落。不融化，落地后被微风吹拂在冰面上形成流动的白色粉尘层。\r\n    - 冰雾弥漫（5%）：极低气温导致近地水汽直接凝华。形成悬浮的极细微冰晶雾。能见度不足五米，光线在冰晶中折射呈现惨白光晕。\r\n    - 冻土干风（4%）：无积雪覆盖的裸露区。泥土被彻底冻结硬如岩石。大风刮过卷起极细小的冰冻沙土，打在硬物表面发出微弱的沙沙声。\r\n    - 阴霾静止（4%）：云层低垂且色彩压抑。毫无气流活动。烟囱排出的浓烟因气压低无法消散而滞留低空，环境缺乏任何动态变化。\r\n    - 阵雪短时（4%）：大块雪云移动。短时间内突降大雪，随后骤然停止。冰面上新增一层蓬松薄雪，踩踏发出清晰的嘎吱脆响。\r\n    - 微弱冷光（4%）：半透明高层薄云遮挡太阳。透出的光线极度苍白且无温度。环境缺乏明暗对比，色调呈现单调的冷灰色。\r\n    - 冰雹夹雪（4%）：极寒冷对流。硬质小冰粒与雪花混合砸下。击打在硬物表面发出密集噼啪声，迅速堆积出一层粗糙且坚硬的冰雪层。\r\n    - 寒霜深结（4%）：无云无风。所有物体表面（包括垂直墙面与室内玻璃内侧）均凝结出一层厚重的刺白冰霜结构，极度消耗周围热量。\r\n    - 多云阴冷（3%）：大块厚云缓慢移动。阳光极少透出，深重阴影长时间覆盖地表，温度始终处于极低水平，光线平淡。\r\n    - 刺骨微风（3%）：风速极其缓慢。但气团极冷，具有强烈的物理穿透性。持续剥离物体表面残存热量，风声细微但寒意逼人。\r\n    - 冰冻冷雨（3%）：冬季异常升温。降下过冷水滴。落地瞬间形成透明滑溜的薄冰层，紧紧附着在前期积雪与石板表面形成硬壳。\r\n    - 强烈雪盲（3%）：晴朗无云。强烈阳光直接反射在无垠的平整雪面上。亮度极高，直视会导致强烈视觉眩晕与暂时白化，缺乏参照物。\r\n    - 寒风啸鸣（3%）：无降雪。高速干冷气流在建筑缝隙与树干间穿梭。发出尖锐的持续风啸声，强行推挤未锁紧的木门，发出嘎吱声。\r\n    - 朦胧冰尘（3%）：空气中悬浮大量极微小冰晶。视线远端模糊不清。光线散射严重，呼吸时能明显感觉到冰凉的微粒吸入气道。\r\n    - 沉闷滞气（3%）：气压极低。空气密度大且凝滞。声音传播沉闷发钝，缺乏回声，烟尘贴地蔓延，环境显得压抑且毫无生气。\r\n    - 冰层断裂（2%）：水域底层水流变化或气温极变。表面厚冰层受力不均发出巨大的沉闷断裂声响，冰面出现清晰的细长裂纹。\r\n    - 极低日照（2%）：太阳贴近地平线。阳光入射角极低，拉长所有物体的冷色阴影。光线本身完全丧失热度，呈现灰白色调。\r\n    - 旋风卷雪（2%）：局部冷气流交汇。形成小型旋风。卷起地面干松的粉末状积雪在半空高速旋转，形成移动的白色雪柱。\r\n    - 冰寒绝地（2%）：气温探底。空气中水分完全冻结析出。环境极度干爽、寂静，缺乏任何生命活动的自然声响，触物如冰。\r\n</天气_冰封月_id1>\r\n<天气_暗夜月_id12>\r\n天气_暗夜月:\r\n  天气列表:\r\n    - 冰封万里（8%）：晴朗无云。地表被稳定积雪与厚冰层覆盖。阳光在白色表面产生强烈反射，空气极度干冷，呼气迅速形成浓重白雾。\r\n    - 大雪纷飞（8%）：铅灰色天空。大片雪花密集且无间歇降下。能见度降至极低，新增降雪迅速掩盖路面坑洼与结冰区，环境声音被大雪严重吸收。\r\n    - 阴沉极寒（6%）：均质厚重黑云密布。无风无降雪。气温持续探底，空气凝滞。未加热的金属与石材表面触之极易发生物理粘连，光线暗沉。\r\n    - 狂风暴雪（6%）：暴力冷气流裹挟密集降雪。雪片横向飞舞，严重阻碍视线。风力堆积雪堆，堵塞迎风面门窗，物理推力极大。\r\n    - 晴冷刺骨（6%）：天空高远透明。阳光毫无加热能力。持续干冷风刮过，迅速切割暴露表面，带走仅存的热量，冰面平滑反光。\r\n    - 坚冰覆地（5%）：无降水。前期融水与积雪彻底冻结成坚硬厚实的暗冰层。路面摩擦力趋近于零，行走与车辆行驶极度困难且易失控。\r\n    - 细碎干雪（5%）：灰暗天空。细小如盐粒的干雪随风飘落。不融化，落地后被风吹拂在冰面上形成流动白色粉尘。\r\n    - 冰雾弥漫（5%）：极低气温导致空气水汽直接凝华。形成悬浮的极细微冰晶雾。能见度不足五米，光线在冰晶中折射呈现惨白光晕。\r\n    - 冻土干风（4%）：无积雪覆盖区。泥土被彻底冻结硬如岩石。大风刮过卷起极细小的冰冻沙土，打在表面发出微弱沙沙声。\r\n    - 阴霾静止（4%）：云层低垂且色彩压抑。毫无气流。烟囱排出的浓烟无法消散而滞留低空，环境缺乏任何动态变化。\r\n    - 阵雪短时（4%）：云块移动。短时间内突降大雪，随后骤然停止。地面新增一层蓬松薄雪，踩踏发出清晰的嘎吱声。\r\n    - 微弱冷光（4%）：半透明高层云遮挡太阳。透出的光线极度苍白且无温度。环境缺乏明暗对比，色调呈现冷灰色。\r\n    - 冰雹夹雪（4%）：强冷对流。硬质小冰粒与雪花混合砸下。击打在硬物表面发出密集噼啪声，迅速堆积一层粗糙冰雪层。\r\n    - 寒霜深结（4%）：无云无风。所有表面（甚至包括垂直墙面）均凝结出一层厚重的刺白冰霜结构，极度消耗周围热量。\r\n    - 多云阴冷（3%）：大块厚云缓慢移动。阳光极少透出，阴影长时间覆盖地表，温度始终处于极低水平，光线平淡。\r\n    - 刺骨微风（3%）：风速缓慢。但气团极冷，具有强烈的物理穿透性。持续剥离热量，风声细微但寒意逼人。\r\n    - 冰冻冷雨（3%）：冬季极罕见升温。降下过冷水滴。落地瞬间形成透明滑溜的“黑冰”层，附着在积雪表面形成硬壳。\r\n    - 强烈雪盲（3%）：晴朗无云。强烈阳光直接反射在无垠平整雪面上。亮度极高，直视会导致强烈视觉眩晕与暂时白化。\r\n    - 寒风呼啸（3%）：无降雪。高速干冷气流在建筑缝隙间穿梭。发出尖锐的持续风啸声，强行推挤未锁紧的木门。\r\n    - 朦胧冰尘（3%）：空气中悬浮极微小冰晶。视线远端模糊不清。光线散射严重，呼吸时能感觉到冰凉的微粒吸入。\r\n    - 沉闷滞气（3%）：气压极低。空气密度大且凝滞。声音传播沉闷发钝，缺乏回声，环境显得压抑且毫无生气。\r\n    - 冰层断裂（2%）：河流或深水洼底层水流变化。表面厚冰层受力不均发出巨大的沉闷断裂声响，表面出现细长裂纹。\r\n    - 极低日照（2%）：太阳贴近地平线。阳光入射角极低，拉长所有物体的冷色阴影。光线本身完全丧失热度。\r\n    - 旋风卷雪（2%）：局部冷气流交汇。形成小型旋风。卷起地面干松积雪在半空高速旋转，形成移动的白色雪柱。\r\n    - 冰寒绝地（2%）：气温探底。空气中水分完全冻结析出。环境极度干爽、寂静，木材因极寒收缩发出清晰的爆裂脆响。\r\n</天气_暗夜月_id12>\r\n<天气_霜降月_id11>\r\n天气_霜降月:\r\n  天气列表:\r\n    - 严霜铺地（8%）：晴朗无云。气温降至零下。清晨所有露天表面（泥土、木材、金属、植被）均覆盖一层厚重白霜，触感极其冰冷且略带粘性。\r\n    - 阴冷刺骨（8%）：低沉灰云密布。无风无雨。空气湿度大且温度极低，冷气具有强烈穿透性。石材地面散发持续寒意。\r\n    - 晴冷大风（6%）：天空高远透亮。高速干冷气流持续刮过。风声尖锐，迅速剥夺地表与暴露表面的热量。水洼表面结成硬冰。\r\n    - 冻土坚硬（6%）：持续低温无降水。未铺装泥土路面被彻底冻结，车辙与脚印形成坚硬且凹凸不平的坑洼，行走极度颠簸且易滑。\r\n    - 初雪飘落（6%）：云层灰暗。细小干燥的雪花稀疏降下。落地后在背阴处积聚成极薄的白色粉层，无风时下落轨迹笔直。\r\n    - 冰雨淅沥（5%）：天空铅灰。过冷水滴持续降下。接触地表或物体瞬间凝结为透明冰壳。树枝下垂，地面形成大面积湿滑暗冰。\r\n    - 浓雾湿冷（5%）：高密度乳白水汽贴地。能见度不足五步。空气中充满悬浮的冰冷微小水滴，声音传播沉闷，光线散射泛白。\r\n    - 薄云冷光（5%）：半透明高层云遮挡太阳。透出惨白光线。环境缺乏明暗对比，色彩饱和度极低，完全无热源辐射感。\r\n    - 狂风残叶（4%）：暴力冷气流扫过。剥离树冠最后几片枯叶。风声掩盖其他环境音，迎风行走受阻，轻微扬起冻结的干土。\r\n    - 阴冷结冰（4%）：云层厚重。无风。气温持续在冰点以下，浅层死水彻底冻透，河流边缘形成向中心蔓延的冰面。\r\n    - 绵绵冷雨（4%）：低空积云。接近零度的雨水无间歇降下。不结冰但彻底浸透未遮蔽表面，环境湿度与寒意达到极高值。\r\n    - 冰雪混合（4%）：灰白天空。雨水与碎雪团混合降下。落地化为冰水混合泥浆，极度湿滑且迅速带走接触物的热量。\r\n    - 晴空透亮（4%）：无云。阳光直射。空气极其干爽透明。阳光下有极微弱暖意，一旦进入阴影区气温断崖式下跌。\r\n    - 沉闷滞气（4%）：均质灰云。无气流流动。气压偏低，烟囱烟雾贴地扩散。环境静谧，缺乏任何自然物理声音。\r\n    - 阵雪骤停（4%）：大块雪云移过。短时密集降下大片雪花，随后迅速放晴。地面形成薄层斑驳积雪，阳光下开始缓慢半融化。\r\n    - 刺骨微风（3%）：少云。风速缓慢但气流极冷。持续切割暴露表面，风带起地面零星冰晶粉末。\r\n    - 湿冷弥漫（3%）：无明显降水。空气中充满冰冷水腥气。所有未加热物体表面触感潮湿且冰冷，木质门窗发胀发紧。\r\n    - 朦胧冷雾（3%）：浅层冰冷雾气。远景轮廓模糊。空气透着灰蓝色调，光线暗淡，环境笼罩在幽暗湿冷的氛围中。\r\n    - 干燥极寒（3%）：气团干冷。空气完全丧失水分。木材与皮革硬化发脆，摩擦声尖锐，冰冻地面硬度接近岩石。\r\n    - 多云阵寒（3%）：大块厚云被风推移。阴影扫过地表时，气温出现明显跌落，光线在明暗间生硬切换。\r\n    - 冰雹突降（2%）：黑云短时压顶。细小坚硬冰粒密集砸落地面。击打玻璃与瓦片发出清脆劈啪声，无积水形成。\r\n    - 烈日冷风（2%）：强光直射。伴随高速极冷气流。光线刺眼但温度极低，风力强行剥夺阳光带来的微弱热量。\r\n    - 阴雨凝冰（2%）：降雨过程中气温突降。落在地面的雨水逐渐转变为半透明的冰冻泥浆层，路面摩擦力极剧下降。\r\n    - 冰冻旋风（2%）：局部气流交汇。形成小型冷旋风。卷起地面残余冰雪碎屑与沙尘，打在表面有轻微痛感。\r\n    - 极低日照（2%）：太阳入射角极低。光线穿透力强但毫无温度。将建筑阴影拉得极长，光线本身呈现冷白色。\r\n</天气_霜降月_id11>\r\n<天气_落穗月_id10>\r\n天气_落穗月:\r\n  天气列表:\r\n    - 晴冷干风（8%）：无云。天空呈高饱和度深蓝。阳光直射但完全无加热效果。干冷气流持续刮过，未涂油木材表面干涩发紧，地面落叶堆被吹散。\r\n    - 枯叶满地（8%）：少云。平缓冷风持续。极大量干枯树叶脱落覆盖路面，掩盖原本的地面坑洼，踩踏发出密集的碎裂脆响。\r\n    - 阴沉微寒（6%）：厚重灰云遮蔽天空。无风无降水。光线暗淡，石板地面与建筑背阴面散发持续寒气，金属物件触感冰冷。\r\n    - 薄云冷光（6%）：半透明高云覆盖。透出的光线苍白。地面无清晰阴影，环境色调偏冷灰，缺乏热源辐射感。\r\n    - 绵绵秋雨（6%）：天空铅灰。冰冷雨水均匀且无间歇降下。雨水温度逼近冰点，彻底浸透泥土与木材，击打水洼表面声音沉闷。\r\n    - 干燥冷寂（5%）：无云且无降水。空气水分极度匮乏。绳索与皮革变硬，摩擦产生明显刺耳声响，木制结构偶尔发出收缩脆响。\r\n    - 寒风掠树（5%）：中等冷气流刮过。风中带有干枯泥土与朽叶气味。树枝大幅摇晃，残余树叶大范围脱落。\r\n    - 阴霾静滞（5%）：云层灰暗且厚度均匀。气流极其缓慢。空气湿度偏高但无降水，环境缺乏动态物理声音，气压偏低。\r\n    - 多云阵寒（5%）：大块厚云被冷风推移。阴影扫过地表时，温度出现明显跌落感，光线在明暗间频繁且生硬地切换。\r\n    - 阵雨骤冷（4%）：云层突至。大颗极冷雨滴砸落地面，迅速形成积水。水坑表面在雨停后散发明显寒气，气温显著下降。\r\n    - 浓雾封锁（4%）：高密度乳白水汽紧贴地表。视线在数步外受严重物理阻碍。光线呈均质灰白，声音在浓雾中迅速衰减发闷。\r\n    - 晴空透亮（4%）：视野极其开阔。阳光直射，空气清冽。背阴处与阳光下存在明显温差，静止水面反射刺眼冷光。\r\n    - 寒霜覆地（4%）：无云无风。清晨地表、残草及所有裸露金属表面覆盖一层明显的刺白冰晶，接触极易黏附物体表皮。\r\n    - 雨后阴冷（4%）：冷雨停止但无阳光。地表水分蒸发过程大量吸热，导致近地面空气温度进一步下探，水洼边缘微凝。\r\n    - 细密冷雨（4%）：雨滴极小且温度低。打在玻璃与硬木上发出细密沙沙声。水分渗入地表极浅层，不形成明显水流。\r\n    - 朦胧冷雾（3%）：浅层雾气持续不散。远景轮廓模糊，色彩暗淡。环境笼罩在幽暗湿冷的氛围中，物体表面凝结细微冷水珠。\r\n    - 狂风呼啸（3%）：暴力气流短时掠过。折断脆弱枯枝，吹翻室外轻质未固定物体。迎风面承受明显的物理推力。\r\n    - 冰冷雨水（3%）：雨水中混杂极少量碎冰。落地瞬间融化，极度消耗环境热量。未铺装路面变得湿滑且泥泞。\r\n    - 湿冷弥漫（3%）：无明显降水。空气中充满悬浮冷水珠，附着在未加热表面。环境带有明显的冰冷水腥气与木材朽味。\r\n    - 旋风卷叶（3%）：不规则气流交汇。局部形成小型旋风，将干枯树叶与细小碎屑卷入半空高速旋转。\r\n    - 沉闷低云（3%）：云层厚重且距离地表极近。无风无雨。气压显著偏低，烟囱排出的烟雾下沉无法快速消散。\r\n    - 浅水结冰（2%）：气温短时跌破冰点。泥水坑与静止水面边缘凝结出极薄的脆弱冰层，轻微受力即碎裂。\r\n    - 雷雨罕至（2%）：深秋对流。黑云中闪烁冷光并伴随闷雷。倾泻冰冷大雨，空气充满刺鼻冷冽感。\r\n    - 微风干爽（2%）：平缓干冷气流。风速极小。地面铺满干枯枝叶，空气中缺乏水汽，环境处于极度平稳的静止状态。\r\n    - 强烈冷光（2%）：太阳入射角度极低。强光直接穿透建筑内部。光线刺眼且拉长阴影，但完全无法提升物体表面温度。\r\n</天气_落穗月_id10>\r\n<天气_金叶月_id9>\r\n天气_金叶月:\r\n  天气列表:\r\n    - 晴冷干风（8%）：天空透明度高。阳光直射但无明显加热效果。干冷气流持续刮过，带走表面水分，未涂油木材表面干涩。\r\n    - 满地枯叶（8%）：平缓冷风。天空少云。大量干枯树叶脱落覆盖路面，踩踏发出密集的碎裂脆响。\r\n    - 阴沉微寒（6%）：厚重灰云。无风无雨。光线暗淡，石板地面散发持续寒气，金属物件触感冰冷。\r\n    - 薄云冷光（6%）：半透明云层遮挡太阳。透出的光线苍白发冷。地面无清晰阴影，环境缺乏暖色调。\r\n    - 绵绵冷雨（6%）：天空铅灰。冰冷雨水均匀降下。彻底浸透泥土与木材，雨滴击打水洼表面声音沉闷。\r\n    - 干燥微冷（5%）：无云且无降水。空气水分极低。绳索与皮革变硬，摩擦产生明显声响，呼吸带有干涩感。\r\n    - 寒风落叶（5%）：中等冷气流刮过。风中带有泥土干枯气味。树枝摇晃，残余树叶大范围脱落。\r\n    - 阴霾静滞（5%）：云层灰暗压抑。气流缓慢。空气湿度偏高但无降水，环境缺乏动态物理声音。\r\n    - 多云阵寒（5%）：大块厚云移动。阴影扫过地表时温度出现明显跌落，光线在明暗间频繁切换。\r\n    - 阵雨骤冷（4%）：云层突至。大颗极冷雨滴砸落地面。迅速形成积水，水坑表面在雨停后散发明显寒气。\r\n    - 浓雾封锁（4%）：高密度乳白水汽覆盖地表。视线受严重阻碍，光线呈均质灰白，声音在浓雾中迅速衰减。\r\n    - 晴空透亮（4%）：视野极其开阔。阳光直射，背阴处与阳光下存在明显温差体感，空气清冽。\r\n    - 寒霜覆地（4%）：无云无风。地表、残草及金属表面覆盖一层明显的刺白冰晶，接触极易黏附表皮。\r\n    - 雨后阴冷（4%）：冷雨停止但无阳光。地表水分缓慢蒸发大量吸热，导致近地面空气温度进一步下探。\r\n    - 细密冰雨（4%）：雨滴极小且温度逼近冰点。打在玻璃与硬木上发出细密噼啪声，迅速带走物体表面温度。\r\n    - 朦胧冷雾（3%）：浅层雾气持续。远景轮廓模糊，色彩暗淡。环境笼罩在幽暗湿冷的氛围中。\r\n    - 狂风呼啸（3%）：暴力气流掠过。折断脆弱枯枝，吹散地面落叶堆。迎风行走承受明显的物理推力。\r\n    - 雨夹雪（3%）：气温极低。冷雨中混杂细碎冰晶。落地瞬间融化为冰水混合物，极度消耗环境热量。\r\n    - 湿冷弥漫（3%）：无明显降水。空气中充满悬浮冷水珠。附着在未加热表面，呼吸带有明显的冰冷水腥气。\r\n    - 枯叶旋风（3%）：不规则气流交汇。局部形成小型旋风，卷起干枯树叶与细小碎屑高速旋转。\r\n    - 沉闷低云（3%）：云层厚重且距离地表极近。无风无雨，气压显著偏低，环境缺乏任何回声。\r\n    - 阴冷结冰（2%）：气温短时跌破冰点。泥水坑与静止水面边缘凝结出极薄的脆弱冰层，触之即碎。\r\n    - 暴雨夹冰（2%）：强降水。雨水中夹杂极小颗粒冰雹，密集击打表面，未铺装路面迅速泥泞且冰冷。\r\n    - 微风干爽（2%）：平缓干冷气流。风速极小，地面铺满干枯枝叶，空气中缺乏水汽，环境平稳。\r\n    - 雷雨罕至（2%）：秋季对流。黑云中闪烁冷光伴随闷雷。倾泻冰冷雨水，空气充满刺鼻冷冽感。\r\n</天气_金叶月_id9>\r\n<天气_收获月_id8>\r\n天气_收获月:\r\n  天气列表:\r\n    - 晴朗干爽（8%）：无云。光线明亮但不刺眼。空气水分低，微风不带明显冷热感。无物理阻碍，视线通透。\r\n    - 秋高气爽（8%）：深蓝色天空毫无云层。阳光充足。空气透明度极高，微风带有极微弱凉意。\r\n    - 多云平稳（6%）：大块厚云缓慢移动。阳光断续出现。阴影覆盖时气温微降，光线在明暗间平缓切换。\r\n    - 绵绵秋雨（6%）：灰云密布。细密冷雨持续降下。雨水冷凉，缓慢浸润未铺装路面，泥土变得湿软但不泥泞。\r\n    - 微风落叶（6%）：平缓气流。光线柔和。风中带有干燥土味，树木部分黄叶自然脱落，地面散落零星枯叶。\r\n    - 阴沉微凉（5%）：厚重灰云遮挡天空。无光照。石材与金属表面透出凉意，环境光线暗淡平淡。\r\n    - 干燥微风（5%）：空气湿度大幅下降。微风持续。未上漆木材表面干涩，门轴摩擦声变大。\r\n    - 薄雾弥漫（5%）：浅层水汽覆盖近地表。光线被水汽散射变得柔和发白。远景色彩饱和度降低，湿度适中。\r\n    - 高云薄遮（4%）：半透明高层云覆盖天空。阳光苍白。地面无明显阴影，环境色调偏向冷灰，无风。\r\n    - 阵雨带寒（4%）：云层快速堆积。短时降下大颗冷雨滴。击打表面发出清脆声响，雨后积水散发微弱寒气。\r\n    - 晴风扬尘（4%）：无云。干燥大风刮过。卷起未固定的沙土与碎屑，沙粒击打玻璃发出持续沙沙声。\r\n    - 阴雨连绵（4%）：天空铅灰。小雨无间歇降下。彻底浸透泥土与浅层木材，环境温度稳定在偏低区间。\r\n    - 雨后初霁（4%）：冷雨刚停。云层裂开。空气透明度高，地面积水反射冷色调天光，泥土散发潮湿气味。\r\n    - 沉闷无风（4%）：云层均匀平坦。气流完全静止。缺乏落叶或风吹的动态声响，环境缺乏变化。\r\n    - 寒气初显（4%）：晴朗无风。气温明显降低。背阴处与金属表面触感冰凉，呼出气体在空气中短暂可见。\r\n    - 浓重白雾（3%）：高密度水汽阻断视线。十步外景物模糊。声音传播受到物理阻隔变得发闷，环境湿冷。\r\n    - 疾风过境（3%）：强风短时呼啸。大幅摇撼树冠，剥离大量枯叶在空中飞舞。未固定门窗被风力推动。\r\n    - 晴冷有风（3%）：无云。阳光明亮。干冷气流持续刮过，迅速带走暴露表面的热量。\r\n    - 细雨如丝（3%）：极小颗粒降水。无风。雨水无法形成径流，仅在物体表面凝结出一层细密冷水珠。\r\n    - 雷声滚动（3%）：厚云中传出隐约雷声。无降水。气压降低，木制建筑在低频震动中发出微弱共鸣。\r\n    - 阴冷积水（2%）：降水后无阳光。坑洼积满冷水。未铺装路面被浸泡变得泥泞崎岖，水分蒸发停滞。\r\n    - 狂风卷叶（2%）：气流在建筑间形成旋涡。枯叶与纸屑被卷入半空盘旋，发出密集沙沙声。\r\n    - 寒霜微结（2%）：气温极低且无降水。清晨地表及裸露金属表面凝结细微白色冰晶，触感刺骨。\r\n    - 强烈冷光（2%）：太阳入射角度低。强光直接射入建筑深处。光线刺眼拉长阴影，但无法提升表面温度。\r\n    - 湿冷透骨（2%）：阴雨交加且无风。空气充满冷水滴。水分浸透布料，寒气具有物理穿透性。\r\n</天气_收获月_id8>\r\n<天气_炎阳月_id7>\r\n天气_炎阳月:\r\n  天气列表:\r\n    - 晴热无风（8%）：无云。阳光直射地面，物体阴影边缘锐利。空气静止，接触露天金属与石材表面有明显灼热感。阴影区与暴晒区存在显著温差。\r\n    - 闷热多云（8%）：大块白云缓慢移动。光线在明暗间平缓切换。空气湿度偏高且缺乏气流，体表水分自然蒸发缓慢。环境缺乏动态物理变化。\r\n    - 持续微热（6%）：天空覆盖半透明高云。光线散射均匀，无刺眼高光。微弱热气流掠过表面，带有干燥的尘土气味。未铺装路面水分被完全烤干。\r\n    - 旱风轻掠（6%）：少云。持续刮起带有热意的平缓气流。树叶发出微弱沙沙声，风力卷起地面细小尘土。无严重物理阻碍。\r\n    - 阴沉滞闷（6%）：厚重灰云完全遮挡阳光。光线平淡暗沉。无风无雨，气压偏低，环境声音传播发钝。\r\n    - 细雨微降（5%）：云层均匀。极小雨滴疏散落下。雨滴接触发热的地面迅速蒸发，空气中散发泥土腥气。降水量不足以形成水洼。\r\n    - 骤雨初歇（5%）：降水刚停。天空云层散开。空气湿度大，路面低洼处存在浅层积水。积水在阳光下缓慢蒸发。\r\n    - 热浪静置（5%）：无云。空气透明度高。近地表热空气上升导致视线远端产生轻微水波纹扭曲。静止站立即可感到环境热量压迫。\r\n    - 阵雨突降（4%）：云层快速堆积。大颗温热雨滴在短时间内密集砸落，随后骤停。雨点击打木板声音沉闷，地面迅速形成径流。\r\n    - 晴风扬尘（4%）：无云。中等强度阵风刮过。扬起街道表面干燥浮土，沙砾击打表面发出极细微的沙沙声。迎风行走伴随轻微阻力。\r\n    - 湿热交加（4%）：雨后阳光直射。地面积水快速蒸发。空气中充满温热水汽，呼吸带有滞重感。金属与玻璃表面凝结细密水膜。\r\n    - 高温少云（4%）：仅有零星点状云层。阳光照射面积大。深色吸热物体表面发烫，浅水坑水分快速流失。\r\n    - 沉闷雷音（4%）：黑云聚集。极远处传来低沉雷声。无降水或闪电，气压显著降低，木质建筑产生微弱共鸣。\r\n    - 狂风骤雨（3%）：对流气团。强风将密集雨幕吹至倾斜。雨水强力冲刷建筑外墙，视线在十米外受阻。\r\n    - 暴雨如注（3%）：厚重积雨云。雨水流量大且持续。击打屋顶声音震耳，街道排水系统满载，低洼处积水没过脚面。\r\n    - 烈日暴晒（3%）：无云。阳光极度刺眼。强紫外线照射导致浅色石材产生眩光，长期暴露表面产生轻微焦糊味。长时间直视室外易视觉疲劳。\r\n    - 旱地干裂（3%）：长期无降水。地表土壤干裂发白。空气干涩，木制门窗因失水收缩，开合伴随木材摩擦声。\r\n    - 凉风忽至（3%）：冷气流短时介入。刮起带有凉意的平缓风。迅速带走地表淤积热量，环境温度小幅跌落。\r\n    - 闪电频发（3%）：雷云内部放电。天际持续闪烁白光。伴随刺鼻臭氧气味，降水量少。\r\n    - 暴雨初停（3%）：强降水停止。空气悬浮物被洗净，透明度极高。积水表面清晰倒映天空与建筑轮廓。\r\n    - 细密热雨（3%）：云层较薄。细雨持续降下。雨水温度接近体温，环境始终处于湿润发烫状态。\r\n    - 微风送爽（2%）：低压槽边缘。凉爽微风持续吹拂。带走空气中的闷热感，树叶摩擦声清脆。\r\n    - 光影斑驳（2%）：碎云快速移动。地表频繁在直射光与阴影间切换。光线变化快，气温无明显波动。\r\n    - 强风呼啸（2%）：热气流高速刮过。风声尖锐。剥离树冠脆弱枝叶，吹翻室外未固定轻质物体。\r\n    - 沉闷无风（2%）：天空被均质灰白云覆盖。毫无气流活动。环境极度静谧，缺乏任何动态物理声响。\r\n</天气_炎阳月_id7>\r\n<天气_长日月_id6>\r\n天气_长日月:\r\n  天气列表:\r\n    - 烈日当空（4%）：无云。阳光极其强烈。地面泛白发亮，无阴影遮蔽的物体表面温度极高。\r\n    - 闷热难耐（4%）：无风且空气湿度大。环境如同蒸笼，水分无法蒸发，金属表面凝结温热汗滴。\r\n    - 狂风暴雨（4%）：黑云迅速笼罩。狂风吹斜树木，雨水连成线倾泻，十米外视线完全被雨幕遮挡。\r\n    - 旱风阵阵（4%）：持续气流。风热且极度干燥，吹过表面带来灼烤感，扬起街道上的细小粉尘。\r\n    - 晴热少云（4%）：天空仅有零星白云。气温居高不下，深色吸热物体表面烫手，空气发干。\r\n    - 骤发雷雨（4%）：雷云快速成型。大滴雨水伴随闪电砸下，雨水接触滚烫地面瞬间升起白烟。\r\n    - 持续高温（4%）：高气压笼罩。万里无云，土地深层水分被榨干导致表面龟裂，植物叶片打卷。\r\n    - 暴雨如注（4%）：云层极厚。雨水流量巨大，街道排水系统过载，地面形成没过脚踝的浑浊水流。\r\n    - 微风送爽（4%）：平缓气流。风中带有不易察觉的凉意，吹散局部淤积的闷热空气，树叶沙沙作响。\r\n    - 阴沉欲雨（4%）：厚重黑云压顶。天色极暗犹如黑夜，空气完全静止，气压极低带来强烈生理压迫。\r\n    - 湿热蒸腾（4%）：暴雨后烈日暴晒。地面大量积水被快速加热蒸发，低空充满令人窒息的滚烫水雾。\r\n    - 气温回落（4%）：云层遮挡阳光。伴随稳定冷气流，气温明显低于同期，石板路面散发隐隐凉气。\r\n    - 烈风呼啸（4%）：无降水。风力极大且气温高，强行剥离物体表面水分，吹落树上未成熟果实。\r\n    - 晴空高远（4%）：天空极度湛蓝。阳光毫无阻碍直射，远处的景物在上升的热空气中出现扭曲变形。\r\n    - 持续阴雨（4%）：云层不厚。降水不断且雨水温热，环境始终湿漉，未处理的木制品与皮革极易发霉。\r\n    - 闪电交加（4%）：极强闪电频繁撕裂黑云。雷声震耳欲聋，空气中充满刺鼻的臭氧与电离气味。\r\n    - 凉风阵阵（4%）：低压槽过境。持续刮起冷风，迅速带走环境热量，原本发烫的表面温度急剧下降。\r\n    - 毒日暴晒（4%）：紫外线极强。阳光接触表面产生轻微物理刺痛感，深色布料在阳光下散发焦糊味。\r\n    - 热浪翻滚（4%）：地面热空气不受控上升。环境毫无风力，近地表视野因光线折射产生强烈的水波纹错觉。\r\n    - 光影交错（4%）：大块厚云快速移动。地表频繁在刺眼阳光与深邃阴影间切换，气温随之小幅波动。\r\n    - 细雨微风（4%）：风力极小。雨滴细碎如粉末，仅能微微润湿地表浅层，无法形成径流。\r\n    - 干燥龟裂（4%）：空气极度缺乏水分。木质门窗收缩变形开合发出干涩摩擦声，纸张与皮革变脆。\r\n    - 暴雨初霁（4%）：大雨戛然而止。阳光穿透散开的云层，空气中灰尘被洗净，能见度达到极高水平。\r\n    - 沉闷静滞（4%）：天空被均质灰云覆盖。毫无气流活动，声音传播缺乏回声，环境显得死气沉沉。\r\n    - 烈风扬沙（4%）：气流高速运动。卷起地面粗大沙砾，击打在门窗与墙壁上发出持续的沙沙声。\r\n</天气_长日月_id6>\r\n<天气_绿涨月_id5>\r\n天气_绿涨月:\r\n  天气列表:\r\n    - 晴热初显（4%）：无云。阳光直射产生轻微炙烤感。未遮蔽的石材与金属表面发烫。\r\n    - 暖风和畅（4%）：持续南风。空气带有明显热意，大量植物飞絮与种子在气流中悬浮移动。\r\n    - 闷热无风（4%）：气温高且空气静止。环境极度憋闷，水分蒸发缓慢，阴暗角落滋生霉菌。\r\n    - 多云遮阳（4%）：大片白云移动。直射阳光被频繁阻断，环境温度适中，光影交界线分明。\r\n    - 阴云密布（4%）：深灰色云层压低天空。空气湿度极大，木板受潮发软，低空有大量飞虫。\r\n    - 骤雨初歇（4%）：短时暴雨刚停。路面坑洼处积满浑浊泥水，空气中弥漫浓重的泥土腥味。\r\n    - 绵绵暖雨（4%）：细小雨滴持续降下。雨水带有温热感，植物叶片积水下垂，无明显降温。\r\n    - 狂暴雷雨（4%）：天色极暗。巨大雷声伴随密集闪电，黄豆大雨点砸在屋顶发出震耳轰鸣。\r\n    - 急促阵雨（4%）：厚云突至。强降水在极短时间内冲刷地表，雨水顺着倾斜面形成小型瀑布。\r\n    - 浓重白雾（4%）：高湿度导致近地表水汽凝结。能见度极差，物体表面凝结大颗水珠。\r\n    - 朦胧水汽（4%）：空气湿度接近饱和。视线远端模糊，呼吸带有明显的温热水润感。\r\n    - 狂风摧枝（4%）：高速气流掠过。吹落大量树叶与花朵，质量较轻的室外未固定物品被吹翻。\r\n    - 干燥扬尘（4%）：连续无降水。大风卷起干燥地表的浮土，空气浑浊，视线带有土黄色滤镜。\r\n    - 阴冷回潮（4%）：厚云遮挡阳光。气温异常下降，风中带有冷意，石材地面返潮渗出水珠。\r\n    - 晴空万里（4%）：天空呈纯粹的深蓝色。光线穿透力极强，直视天空会导致视觉短暂发黑。\r\n    - 隐隐闷雷（4%）：远处云层深处雷声滚动。无闪电与降水，空气压抑沉闷，气压显著降低。\r\n    - 飞絮漫天（4%）：微风持续。极大量白色植物绒毛充满空气，极易附着在粗糙表面与织物上。\r\n    - 湿热蒸笼（4%）：雨后阳光直射。地表水分快速蒸发，空气充满滚烫水汽，呼吸带有窒息感。\r\n    - 疾风骤起（4%）：气压突变引发短时强风。门窗剧烈碰撞，卷起地面一切松散杂物。\r\n    - 日光倾城（4%）：无风。阳光无死角照射，未铺装地表的浅层水分被完全烤干，泥土开裂。\r\n    - 细雨连绵（4%）：降水极小但无停歇迹象。路面石板持续湿润反光，木质结构吸水膨胀。\r\n    - 局部雷暴（4%）：特定区域黑云压顶。狂风夹杂暴雨与密集闪电，边缘地带仍可见阳光。\r\n    - 暖阳斜照（4%）：阳光穿透低空薄云。光线偏黄且柔和，拉长建筑阴影，环境反差减弱。\r\n    - 沉滞阴天（4%）：云层厚度均匀。无风无雨，光线极其平淡，环境缺乏任何动态物理变化。\r\n    - 干燥无风（4%）：空气水分极低。环境静谧，干枯树叶掉落与摩擦的声音变得异常清晰。\r\n</天气_绿涨月_id5>\r\n<天气_花萌月_id4>\r\n天气_花萌月:\r\n  天气列表:\r\n    - 晴朗透亮（4%）：无云。阳光直射，光度极高。空气透明，新生植物叶片表面反光。\r\n    - 暖阳高照（4%）：少云。阳光充足。地面泥土变干，表层温度略高于气温，阴影边缘清晰。\r\n    - 微风拂面（4%）：气流平缓。风速不足以扬尘，仅吹动细小枝叶与极轻微的漂浮物。\r\n    - 春风强劲（4%）：持续气流。卷起地面落花与细小草叶，木制悬挂物发生规律性摆动。\r\n    - 多云间晴（4%）：大块积云缓慢移动。阳光与阴影在地表交替出现，环境明暗频繁变化。\r\n    - 高层薄云（4%）：天空覆盖半透明薄云。阳光被散射，光线柔和无明显阴影，气温稳定。\r\n    - 阴沉压抑（4%）：厚重灰云完全遮蔽天空。光线转暗，空气湿度显著增加，气压偏低。\r\n    - 绵绵春雨（4%）：细密雨丝持续降下。无风。雨水缓慢渗入泥土，石板路面持续湿润反光。\r\n    - 细雨蒙蒙（4%）：雨滴极小如雾。悬浮在空气中，接触表面迅速凝结成极细密的水珠。\r\n    - 阵雨骤降（4%）：雨势迅猛且雨滴大。短时间内在低洼处形成水流，泥土腥气强烈。\r\n    - 雨后初歇（4%）：降水刚停，云层散开。空气中悬浮微小水滴，积水表面倒映天光。\r\n    - 沉闷雷暴（4%）：黑云低垂。天际闪现强光并伴随震动空气的雷声，雨水大颗粒砸落。\r\n    - 隐隐闷雷（4%）：厚云遮挡。雷声在极远处滚动，声音发闷，无降水或仅有极少量雨滴。\r\n    - 浓重白雾（4%）：乳白色水汽笼罩地表。能见度极低，光线呈现均质白光，声音传播受阻。\r\n    - 朦胧薄雾（4%）：空气湿度极大。视线带有朦胧感，远景色彩饱和度降低，物体表面微潮。\r\n    - 气温骤降（4%）：阴天无风。空气极度阴冷，环境温度逼近冰点，呼气迅速白化。\r\n    - 倒春寒风（4%）：强冷空气高速流过。风力可折断脆弱的新生枝条，残水表面结出薄冰。\r\n    - 干燥扬沙（4%）：无云无降水。大风刮过未被植被完全覆盖的泥地，空气中充满细小沙砾。\r\n 硬，大概是费尔马克镇传过来的。再往下，在木板的右下角，有一行明显比其他字迹新一些的刻字，笔画深而粗犷，一看就是用凿子一笔一划硬凿出来的，每个字的收笔处都带着木刺翻起的毛边。\n\n"招人。包吃包住。酒馆问。"\n\n她盯着那几个字看了两秒钟。手指不自觉地摸上了腰间那个已经磨出毛边的旧布袋，隔着布摸到了里面几枚铜板的形状--明明知道只有八个，指尖还是一枚一枚地点过去，像是再数一遍就能多出来一个似的。耳朵往两边塌了一下，又立起来。离心心念念的“铁心脏”还有半个月路程，连一晚大通铺都住不太起。蹭两天吃住，攒点体力和路费，再上路。她的视线顺着告示牌朝村子里面看去，在缓坡偏南的位置看到了一栋两层的石砌矮楼，一楼有扇木门，门边挂着一块同样风化得厉害的木牌，上面的字从这个距离看不清，但形状像是个杯子的简笔画。\n\n行吧。\n\n泥路在她脚下发出湿软的微响，或者说应该发出微响--她的肉垫把大部分声音都吞掉了，只在特别稀烂的泥坑处才踩出一点点被吸住又拔起的黏腻声。走近了，那股谷物焦甜变得更清晰了，确实是从那栋矮楼里飘出来的，混着陈年木头、铁锅锈气和一点点动物油脂凝固后的冷荤味。她的耳朵朝门的方向转了转--里面没有说话声，没有杯盘碰撞声，连脚步声都没有。要么没开门，要么没客人。\n\n门是虚掩着的。她伸出爪掌推了一下，门轴发出一声极短极低的吱呀，然后就停了。肉垫贴上门板的瞬间她感受到了木头的温度--比外面的空气暖一点点，说明屋里有热源。她侧身闪进去，斗篷下的尾巴最后才跟着挤过门缝，蹭在门框上蓬了一下又压了回去。\n\n屋里比外面暖。不是那种烤火的热，是一种闷了一夜的、灶台余温和木头墙壁慢慢沁出来的温吞暖意。她的尾巴在斗篷底下不自觉地松了松--走了一早上的路，到现在才发现自己的毛一直是竖着的。\n\n酒馆比她预想的还小一些。六张木桌散落在前厅里，桌面擦过但没擦干净，靠窗那张的角落里还残着一圈干涸的水渍。椅子是粗木拼的，有几把缺了横档。地面是夯土铺了薄薄一层碎石，踩上去脚感粗粝。右手边是厨房方向，一道布帘半掩着，帘子后面传来极微弱的咕嘟声--她的耳朵朝那个方向歪了歪，鼻子跟着吸了一下。谷物焦甜味更浓了，混着一股铁锅被烧热又冷却后特有的金属涩气。整个空间弥漫着一种"有人在用但没什么人来"的气息，干净是干净的，但那种干净透着寡淡，像是一道只放了盐的汤。\n\n她的目光扫完了整个前厅--没有客人，一个都没有--最后落在了柜台后面。\n\n柜台是一块厚实的旧木板架在两个酒桶上，后面的架子上摆着几个陶杯和两只半满的酒桶。一个人趴在柜台上。不，不是趴着，是半靠着--一只手臂搁在木面上，手指头在柜台的木纹上慢慢地划来划去，像是在顺着年轮的弧线描什么看不见的图案。目光是放空的，看着柜台对面的某处，但又不像在看任何具体的东西。身上穿着一件洗得发白的亚麻短袖衫，袖子挽到肩膀，露出的小臂上有薄薄的一层肌肉轮廓和一道淡旧的烫伤疤痕。深棕色粗布短裤，赤脚踩在地上。腰间系着一条旧围裙--灰扑扑的帆布上有几块洗不掉的油渍，但围裙的带子系得很整齐，是那种做过很多次的肌肉记忆式的蝴蝶结。\n\n她在门口站了大约五秒钟。那个人完全没有反应。手指继续在木纹上划，目光继续放空，呼吸平稳得像是这个世界上除了那块木头以外什么都不存在。她的耳朵不确定地朝他的方向转了转--确认了，不是在装没看见，是真的没注意到有人进来。灶火、木柴烟、隔夜的麦粥、微微的汗味--他身上的气味和这间屋子的气味混在一起，几乎分不出哪个是人哪个是酒馆。\n\n她悄悄把斗篷的兜帽往后拨了拨，露出额前的碎发和两只立起来的耳朵。手指拨了拨耳朵旁边垂下来的几缕头发。\n\n"--那个，打扰了。"\n\n她的声音不高，带着一点从外面冷空气里走进来之后还没完全回暖的微哑，句尾拖了一个小小的尾音。柜台后面的手指停住了，目光从木纹上离开，慢了半拍才转过头来。她看到了一张圆脸--还没完全长开的少年轮廓，下颌线条柔和，鼻梁上有几颗淡雀斑，眉毛浓而直，眼睛不大但黑亮，瞳孔颜色很深，像深井里的水。那双眼睛在看到她的瞬间明显愣了一下，然后眨了两下，像是需要一点时间确认"面前真的站了一个人"这件事。\n\n她的耳朵不自觉地微微前倾了一点。这个"老板"比告示牌给她的预期年轻很多。年轻太多了。\n\n但嘴已经比脑子快了--从小在铺子里泡出来的习惯让她没过脑子就挂上了笑，嘴角翘起来，露出一点点小犬牙，语气随意得像是进了自家隔壁的杂货铺："村口告示牌上那个\'招人\'--还算数吗？"\n\n琥珀色的眼睛在笑意下面瞥了一眼他赤脚踩在碎石地上的样子--这么冷的天--又看了一眼围裙上那几块洗不掉的油渍，然后重新回到他的脸上，安安静静地等着。尾巴在斗篷底下轻轻晃了一下。',options:['回应狐耳少女，确认招人还算数'],sum:'解冻月清晨，狐耳少女循着村口
