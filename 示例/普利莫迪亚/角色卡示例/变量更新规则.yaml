---
变量更新规则:
  世界:
    当前历法:
      type: |-
        {
          年: number;
          月份序号: number;
          月份名: '冰封月' | '残雪月' | '解冻月' | '花萌月' | '绿涨月' | '长日月' | '炎阳月' | '收获月' | '金叶月' | '落穗月' | '霜降月' | '暗夜月';
          季节: '隆冬' | '冬末' | '初春' | '仲春' | '暮春' | '初夏' | '盛夏' | '暮夏' | '初秋' | '仲秋' | '暮秋' | '初冬';
          日: number;
          时段: string;
          天气: string;
          时间: string;
        }
      check:
        - 用户行动、移动、营业、购物、烹饪、锻炼、休息、睡眠、收获、酿造后，按剧情实际消耗推进时间。
        - 小行动通常推进分钟级；换地点、采购、劳动、营业可推进小时级；睡眠、长途旅行、跳过空白才跨日。
        - 跨日或跨月时必须同步更新月份序号、月份名、季节、日、时段和时间，月份序号与月份名不得矛盾。
        - 天气只在室外场景、时间跨度较大、旅行或剧情明确变化时更新。
    当前地点:
      type: |-
        {
          区域: string;
          具体位置: string;
          坐标: { x: number; y: number };
        }
      check:
        - 只在用户或剧情实际移动到新区域、酒馆区域、商铺、地图节点或客房时更新。
        - 具体位置直接使用 AI 当前生成并写入的地点文本，不做前端归类、不套预设别名、不把自由地点改成固定地点。
        - 移动后同步更新 主角.所在位置；若离开商铺，同时清空 街坊商铺.当前商铺。
        - 只是查看地图、预览城市、回忆地点或讨论地点时，不改变当前地点。
  酒馆:
    名称:
      check:
        - 只有正式更名、产权变更或用户明确要求改名时更新。
    声望:
      type: number
      range: 0~100
      check:
        - 根据营业表现、顾客评价、事件处理、公开事迹小幅调整。
        - 普通单次变化不超过 ±5，重大事件才允许更大变化。
    资金:
      type: |-
        {
          铜币: number;
          银币: number;
          金币: number;
          铂金币: number;
          秘银币: number;
          折算合计铜币: number;
        }
      exchange:
        - 100铜=1银
        - 10银=1金
        - 500金=1铂金
        - 500铂金=1秘银
      check:
        - 购物、售卖、营业收入、客房收入、建设支出、赔偿、奖励后更新。
        - 前端计算读取折算合计铜币；叙事资产保留五种面额，两者必须同步。
        - 任一面额不得为负；大额收入或支出应说明来源。
    今日营业状态:
      check:
        - 根据当前是否准备营业、营业中、暂停、打烊、忙碌、整顿等状态更新。
    区域:
      type: |-
        {
          [区域名: string]: {
            状态: string;
            风格: string;
            描述: string;
            分配员工: string;
            设施: {
              [设施名: string]: {
                状态: string;
                风格: string;
                描述: string;
                价格折合铜币: number;
              }
            };
            客房: {
              [房间名: string]: {
                类型: string;
                住客: string;
                价格折合铜币: number;
                舒适: number;
                私密: number;
                清洁: number;
                设施: {
                  [房间设施名: string]: {
                    状态: string;
                    风格: string;
                    描述: string;
                    价格折合铜币: number;
                  }
                };
              }
            };
          }
        }
      check:
        - 用户添加设施时，在对应区域的设施中 insert 新设施，并同步扣除酒馆资金。
        - 清洁、损坏、修缮、装修、分配员工、住客入住或退房时更新对应区域或客房。
        - 客房独立记录住客、价格、舒适、私密、清洁与设施，不把所有客房合并成一段描述。
  主角:
    当前状态:
      check:
        - 主角明显处于烹饪、采购、营业、锻炼、疲惫、休息、外出等状态时更新。
    所在位置:
      check:
        - 主角移动后与 世界.当前地点.具体位置 同步；不允许顶部地点与主角位置分裂。
    一句话穿着:
      check:
        - 换衣、衣物破损、清洁、弄湿、弄脏或剧情明确变化时整句 replace。
        - 保持一句话概括，不拆成衣物槽位。
    生命:
      type: |-
        {
          当前值: number;
          上限: number;
          阶段: string;
        }
      check:
        - 受伤、治疗、疾病、战斗、危险事件或长期恢复时更新。
        - 当前值不得超过上限；上限只在长期养成、魔法或重大剧情后改变。
    精力:
      type: |-
        {
          当前值: number;
          上限: number;
          阶段: string;
        }
      check:
        - 用户做出行动后按强度消耗当前值；烹饪、购物、搬运、营业、旅行、锻炼都应消耗。
        - 休息、饮食、睡眠可恢复当前值；当前值不得超过上限。
        - 锻炼或长期养成事件可以提高上限，初始上限为 100，单次提高应有明确剧情依据。
        - 阶段文字随当前值与上限的比例更新，例如充沛、尚可、疲倦、虚弱、力竭。
    烹饪等级:
      type: |-
        {
          等级: number;
          称号: string;
          做菜次数: number;
          下级所需次数: number;
        }
      check:
        - 完成做菜、饮品、酱料或有效练习后可增加做菜次数。
        - 达到下级所需次数后才升级，等级称号必须与等级一致。
        - 等级称号按 1烧火工、2守灶童、3灶台学徒、4行炉工、5持勺匠、6灶台师傅、7首席灶师、8灶火宗师更新。
  库房:
    食材:
      type: |-
        {
          [食材批次名: string]: {
            数量: number;
            标签: string[];
            价格折合铜币: number;
          }
        }
      check:
        - 采购、收获、获得、烹饪消耗、腐坏或丢弃时更新；数量归零时 remove。
        - 自产食材每次收获视为一个批次，批次标签体现风味、产地或照料结果。
    调料:
      type: |-
        {
          [调料名: string]: {
            数量: number;
            标签: string[];
            价格折合铜币: number;
          }
        }
      check:
        - 购买、采集、制酱、烹饪消耗时更新；数量归零时 remove。
    成品:
      type: |-
        {
          [成品名: string]: {
            数量: number;
            标签: string[];
            搭配判定: '灾难级' | '严重冲突' | '轻微冲突' | '无冲突' | '经典搭配' | '绝佳搭配' | '奇迹';
            价格折合铜币: number;
          }
        }
      check:
        - 做菜或制酱完成且可上桌时加入；售卖或丢弃后减少数量。
        - 成品风味压缩进标签，搭配判定只使用允许枚举。
    酒水:
      type: |-
        {
          [酒水名: string]: {
            数量: number;
            标签: string[];
            搭配判定: '灾难级' | '严重冲突' | '轻微冲突' | '无冲突' | '经典搭配' | '绝佳搭配' | '奇迹';
            价格折合铜币: number;
          }
        }
      check:
        - 做饮品、开桶灌装、购买酒水、售卖酒水后更新。
        - 开桶灌装完成后同步更新或移除对应酒窖桶。
    杂物:
      type: |-
        {
          [杂物名: string]: {
            数量: number;
            标签: string[];
            价格折合铜币: number;
          }
        }
      check:
        - 种子、燃料、清洁用品、工具、衣物、设施材料等记录在杂物。
        - 播种会消耗种子并更新农田；建设设施会消耗材料并更新酒馆区域。
  人物羁绊:
    type: |-
      {
        [配角名: string]: {
          种族: string;
          身份: string;
          羁绊阶段: number;
          阶段文字: string;
          好感: number;
          心情: string;
          所在位置: string;
          一句话穿着: string;
          生命: { 当前值: number; 上限: number; 阶段: string };
          精力: { 当前值: number; 上限: number; 阶段: string };
          膀胱: { 当前值: number; 上限: number; 阶段: string };
          备注: string;
        }
      }
    check:
      - 只记录配角，不把主角写入人物羁绊。
      - 互动、送礼、冲突、共同劳动、事件评价后可更新好感、心情和羁绊阶段。
      - 配角移动、换衣、受伤、疲劳、休息、喝水、如厕等事件后同步更新位置、穿着、生命、精力、膀胱。
      - 一句话穿着保持单句概括，不拆槽位。
  农田与酒窖:
    农田:
      type: |-
        {
          [田畦名: string]: {
            状态: string;
            作物: string;
            阶段: number;
            阶段上限: number;
            播种日: string;
            成熟日: string;
            预计产出: string;
            批次标签: string[];
          }
        }
      check:
        - 播种时消耗库房.杂物中的种子，写入作物、播种日、成熟日、预计产出和批次标签。
        - 时间推进、照料、施肥、异常天气会更新阶段和状态。
        - 收获时把产物加入库房.食材，并清空或重置对应田畦。
    酒窖桶:
      type: |-
        {
          [桶名: string]: {
            状态: string;
            内容物: string;
            类型: string;
            酿造开始日: string;
            收获日: string;
            预计产出: string;
          }
        }
      check:
        - 开始酿造、做饮品、做酱、发酵、陈酿、木桶熟成后写入酒窖桶。
        - 到达收获日或开桶灌装后，把产物加入库房.酒水或库房.成品，并移除桶或改为空桶状态。
  街坊商铺:
    当前商铺:
      check:
        - 用户进入某个商铺、摊位、工会、作坊或临时货车时更新为当前店名。
        - 离开商铺、回到酒馆、进入后院或移动到其他地点时清空。
    商铺:
      type: |-
        {
          [商铺名: string]: {
            类型: string;
            店主: string;
            氛围: string;
            招呼语: string;
            今日货架: {
              [商品名: string]: {
                分类: string;
                数量: number;
                单价折合铜币: number;
                标签: string[];
                备注: string;
              }
            };
          }
        }
      check:
        - 进入商铺时生成或刷新适合当前地点和店铺类型的货架。
        - 购买后扣除酒馆资金、减少货架数量，并把购买物加入库房对应分类。
        - 离开商铺时可以保留历史商铺资料，但当前商铺必须清空；若是临时货架，必要时 remove。
